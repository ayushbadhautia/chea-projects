<!DOCTYPE html>
<html>

<head>
  <title>Rock-Paper-Scissors</title>
</head>

<body>
  <p>Rock Paper Scissors</p>
  <button onclick="
      mine = 'Rock';
      playGame();
    ">Rock</button>

  <button onclick="
      mine = 'Paper';
      playGame();
    ">Paper</button>

  <button onclick="
      mine = 'Scissor';
      playGame();
    ">Scissors</button>
  
  <button onclick="
    score.loses = 0;
    score.ties = 0;
    score.wins = 0;
    localStorage.removeItem('score');
  ">Reset Score</button>

  <script>
    const score =(JSON.parse(localStorage.getItem('score')))||(
      {
        wins:0,
        loses:0,
        ties:0
      }
    );

    
    let mine;

    function pickComputerMove() {
      let comp;
      comp = Math.random();
      if (comp >= 0 && comp < 0.33) {
        comp = 'Rock';
      } else if (comp >= 0.33 && comp < 0.66) {
        comp = 'Paper';
      } else {
        comp = 'Scissor';
      }
      return comp;
    }

    function playGame() {
      let result;
      let comp = pickComputerMove();
      if (mine === 'Rock') {
        if (comp === 'Paper') {
          result = 'Lost';
        } else if (comp === 'Rock') {
          result = 'Tie';
        } else {
          result = 'Won';
        }
        
      } else if (mine === 'Paper') {
        if (comp === 'Paper') {
          result = 'Tie';
        } else if (comp === 'Rock') {
          result = 'Won';
        } else {
          result = 'Lost';
        }

        
      } else {
        if (comp === 'Paper') {
          result = 'Won';
        } else if (comp === 'Rock') {
          result = 'Lost';
        } else {
          result = 'Tie';
        }
        
      }
      if(result==='Won'){
        score.wins++;
      }else if(result==='Lost'){
        score.loses++;
      }else{
        score.ties++;
      }
      alert(`Your Choice: ${mine}\nComputers Choice: ${comp}\n ${result}\nWins : ${score.wins} ,Losses : ${score.loses} ,Ties : ${score.ties}`);
      localStorage.setItem('score',JSON.stringify(score));
    }
  </script>
</body>

</html>
