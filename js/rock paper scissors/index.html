<!DOCTYPE html>
<html>

<head>
  <title>Rock-Paper-Scissors</title>
</head>

<body>
  <p>Rock Paper Scissors</p>
  <button onclick="
      mine = 'Rock';
      playGame();
    ">Rock</button>

  <button onclick="
      mine = 'Paper';
      playGame();
    ">Paper</button>

  <button onclick="
      mine = 'Scissor';
      playGame();
    ">Scissors</button>
    <p id="shoe"></p>
    <br>
  <p id="result"></p>
  <p id="score"></p>

  <button onclick="
    score.loses = 0;
    score.ties = 0;
    score.wins = 0;
    localStorage.removeItem('score');
  ">Reset Score</button>

  <script>
    const score =(JSON.parse(localStorage.getItem('score')))||(
      {
        wins:0,
        loses:0,
        ties:0
      }
    );
    
    function showResult(){
      document.querySelector('#shoe').innerHTML = `${result}`;
      document.querySelector('#result').innerHTML = `Yours : ${mine}, Computers : ${comp}\n`;
      document.querySelector('#score').innerHTML = `Wins : ${score.wins}, Loses : ${score.loses}, Ties : ${score.ties}\n`;
    }
    
    let mine;
    let comp;
    let result;
    function pickComputerMove() {
      
      comp = Math.random();
      if (comp >= 0 && comp < 0.33) {
        comp = 'Rock';
      } else if (comp >= 0.33 && comp < 0.66) {
        comp = 'Paper';
      } else {
        comp = 'Scissor';
      }
      return comp;
    }

    function playGame() {
      
      let comp = pickComputerMove();
      if (mine === 'Rock') {
        if (comp === 'Paper') {
          result = 'Lost';
        } else if (comp === 'Rock') {
          result = 'Tie';
        } else {
          result = 'Won';
        }
        
      } else if (mine === 'Paper') {
        if (comp === 'Paper') {
          result = 'Tie';
        } else if (comp === 'Rock') {
          result = 'Won';
        } else {
          result = 'Lost';
        }

        
      } else {
        if (comp === 'Paper') {
          result = 'Won';
        } else if (comp === 'Rock') {
          result = 'Lost';
        } else {
          result = 'Tie';
        }
        
      }
      if(result==='Won'){
        score.wins++;
      }else if(result==='Lost'){
        score.loses++;
      }else{
        score.ties++;
      }
      showResult();
      /*alert(`Your Choice: ${mine}\nComputers Choice: ${comp}\n ${result}\nWins : ${score.wins} ,Losses : ${score.loses} ,Ties : ${score.ties}`);*/
      
      localStorage.setItem('score',JSON.stringify(score));
      
    }
  </script>
</body>

</html>
